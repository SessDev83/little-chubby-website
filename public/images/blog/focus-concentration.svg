<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F6F1E7"/>
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#2C3E50"/>
  <circle cx="600" cy="270" r="110" fill="#34495E" opacity="0.4"/>
  <!-- Brain outline -->
  <path d="M570 230 Q550 210 560 190 Q580 170 600 185 Q620 170 640 190 Q650 210 630 230 Q650 250 640 270 Q630 290 610 280 Q590 290 570 270 Q550 250 570 230Z" stroke="#F5C563" stroke-width="2.5" fill="#F5C563" opacity="0.15"/>
  <!-- Target/bullseye inside brain -->
  <circle cx="600" cy="240" r="22" stroke="#4ECDC4" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="600" cy="240" r="12" stroke="#4ECDC4" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="600" cy="240" r="4" fill="#4ECDC4" opacity="0.7"/>
  <!-- Pencil below -->
  <rect x="580" y="300" width="40" height="8" rx="2" fill="#F5C563" opacity="0.5"/>
  <polygon points="620,300 630,304 620,308" fill="#F5C563" opacity="0.6"/>
  <rect x="575" y="300" width="8" height="8" rx="1" fill="#FF6B6B" opacity="0.4"/>
  <!-- Wavy lines (focus waves) -->
  <path d="M480 250 Q500 240 520 250 Q540 260 560 250" stroke="#F5C563" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M640 250 Q660 240 680 250 Q700 260 720 250" stroke="#F5C563" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Clock -->
  <circle cx="490" cy="210" r="18" stroke="#fff" stroke-width="2" fill="none" opacity="0.25"/>
  <line x1="490" y1="210" x2="490" y2="198" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <line x1="490" y1="210" x2="500" y2="215" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <!-- Checkmarks (progress) -->
  <path d="M700 210 L708 220 L722 200" stroke="#4ECDC4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M700 240 L708 250 L722 230" stroke="#4ECDC4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="28" fill="#fff">FOCUS &amp; CONCENTRATION</text>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="18" fill="#F5C563">How coloring trains your child's attention muscle</text>
</svg>