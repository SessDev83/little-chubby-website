<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F6F1E7"/>
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#8B6B3A"/>
  <circle cx="600" cy="275" r="110" fill="#A07D4A" opacity="0.4"/>
  <!-- Clock -->
  <circle cx="600" cy="265" r="70" stroke="#F5C563" stroke-width="3" fill="#fff" opacity="0.1"/>
  <line x1="600" y1="265" x2="600" y2="215" stroke="#F5C563" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="265" x2="640" y2="280" stroke="#F5C563" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="600" cy="265" r="5" fill="#F5C563"/>
  <!-- Hour markers -->
  <circle cx="600" cy="200" r="4" fill="#F5C563" opacity="0.6"/>
  <circle cx="665" cy="265" r="4" fill="#F5C563" opacity="0.6"/>
  <circle cx="600" cy="330" r="4" fill="#F5C563" opacity="0.6"/>
  <circle cx="535" cy="265" r="4" fill="#F5C563" opacity="0.6"/>
  <!-- Decade labels -->
  <text x="480" y="220" font-family="system-ui,sans-serif" font-size="14" fill="#fff" opacity="0.5">1920s</text>
  <text x="700" y="240" font-family="system-ui,sans-serif" font-size="14" fill="#fff" opacity="0.5">1960s</text>
  <text x="490" y="330" font-family="system-ui,sans-serif" font-size="14" fill="#fff" opacity="0.5">1980s</text>
  <text x="690" y="320" font-family="system-ui,sans-serif" font-size="14" fill="#fff" opacity="0.5">2020s</text>
  <!-- Arrow -->
  <path d="M520 350 Q600 380 680 350" stroke="#F5C563" stroke-width="2" fill="none" opacity="0.4"/>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="28" fill="#fff">FASHION THROUGH TIME</text>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="18" fill="#F5C563">A history lesson through coloring</text>
</svg>