  <text x="530" y="300" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="#F5C563" opacity="0.5">A</text>
  <!-- Letter B -->
  <text x="590" y="290" font-family="system-ui,sans-serif" font-weight="800" font-size="65" fill="#FF6B6B" opacity="0.4">B</text>
  <!-- Letter C -->
  <text x="645" y="305" font-family="system-ui,sans-serif" font-weight="800" font-size="70" fill="#4ECDC4" opacity="0.45">C</text>
  <!-- Crayon -->
  <rect x="540" y="315" width="8" height="40" rx="2" fill="#F5C563" opacity="0.5"/>
  <polygon points="540,315 544,305 548,315" fill="#F5C563" opacity="0.6"/>
  <!-- Sparkle stars -->
  <polygon points="500,210 503,220 513,220 505,226 508,236 500,230 492,236 495,226 487,220 497,220" fill="#F5C563" opacity="0.4"/>
  <circle cx="700" cy="230" r="4" fill="#fff" opacity="0.3"/>
  <circle cx="480" cy="280" r="3" fill="#fff" opacity="0.25"/>
  <circle cx="720" cy="290" r="3" fill="#F5C563" opacity="0.3"/>
  <!-- Light bulb (learning) -->
  <circle cx="680" cy="210" r="15" fill="#F5C563" opacity="0.3"/>
  <rect x="676" y="225" width="8" height="8" rx="1" fill="#F5C563" opacity="0.2"/>
  <line x1="680" y1="190" x2="680" y2="183" stroke="#F5C563" stroke-width="2" opacity="0.3"/>
  <line x1="695" y1="200" x2="700" y2="195" stroke="#F5C563" stroke-width="2" opacity="0.3"/>
  <line x1="665" y1="200" x2="660" y2="195" stroke="#F5C563" stroke-width="2" opacity="0.3"/>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="28" fill="#fff">LETTERS BEFORE PRESCHOOL</text>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="18" fill="#F5C563">The sneaky way to teach the alphabet</text>
