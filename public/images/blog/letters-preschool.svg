<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F6F1E7"/>
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#5C6BC0"/>
  <circle cx="600" cy="270" r="110" fill="#7986CB" opacity="0.3"/>
