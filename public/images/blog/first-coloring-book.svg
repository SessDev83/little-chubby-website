  <rect x="500" y="295" width="40" height="35" rx="3" stroke="#F5C563" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Check mark -->
  <path d="M680 300 L695 315 L720 280" stroke="#F5C563" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Small star -->
  <polygon points="545,200 548,210 558,210 550,216 553,226 545,220 537,226 540,216 532,210 542,210" fill="#F5C563" opacity="0.3"/>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="28" fill="#fff">FIRST COLORING BOOK</text>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="18" fill="#F5C563">What to look for (and what to avoid)</text>
