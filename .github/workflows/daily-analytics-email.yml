# Daily analytics email report.
# Queries yesterday's pageview data from Supabase and sends a
# summary email to the admin via Resend.

name: Daily Analytics Email

on:
  schedule:
    # Every day at 8:00 AM ET (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Report date to resend (YYYY-MM-DD, defaults to yesterday UTC)"
        required: false
        type: string

# Principle of least privilege: this job only reads the repo at checkout and
# calls out to third-party APIs via secrets. No write access to repo/issues.
permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Send daily analytics email
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANALYTICS_EMAIL: ${{ secrets.ANALYTICS_EMAIL }}
          BLUESKY_HANDLE: littlechubbypress.bsky.social
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.date || '' }}" ]; then
            ARGS+=(--date "${{ github.event.inputs.date }}")
          fi
          node scripts/daily-analytics-email.mjs "${ARGS[@]}"
