name: A11y Audit

# Runs axe-core + Pa11y against the Vercel preview URL after deploy completes,
# plus manual workflow_dispatch for ad-hoc runs against any URL (e.g., prod).
# Pkg P2-12.1.
#
# Mode: WARN-ONLY initially (continue-on-error: true on each scan step). The
# workflow uploads JSON reports as artifacts so the operator can triage real
# violations and prioritize follow-up fixes. Promote to fail-hard via P2-12.x
# follow-up once baseline violations are zero.
#
# Master doc: VIII-C.1 (automated WCAG AA scan).

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to audit (defaults to production)"
        default: "https://www.littlechubbypress.com"
        required: false

permissions:
  contents: read
  deployments: read

concurrency:
  group: a11y-${{ github.ref }}-${{ github.event.deployment.environment || 'manual' }}
  cancel-in-progress: true

jobs:
  a11y:
    if: >
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'deployment_status'
        && github.event.deployment_status.state == 'success'
        && github.event.deployment.environment == 'Preview'
        && startsWith(github.event.deployment_status.target_url, 'https://')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Resolve target URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run axe-core (home EN + ES)
        continue-on-error: true
        env:
          A11Y_TARGET_URL: ${{ steps.url.outputs.target }}
        run: |
          npx @axe-core/cli "$A11Y_TARGET_URL/en/" "$A11Y_TARGET_URL/es/" \
            --exit \
            --tags wcag2a,wcag2aa \
            --save axe-report.json \
            || echo "::warning::axe-core found violations (see axe-report.json artifact)"

      - name: Run Pa11y CI (10 URLs)
        continue-on-error: true
        env:
          A11Y_TARGET_URL: ${{ steps.url.outputs.target }}
        run: |
          # Pa11y does not shell-expand env vars in its JSON config; we
          # substitute them ourselves before invoking pa11y-ci.
          envsubst < .pa11yci.json > .pa11yci.resolved.json
          npx pa11y-ci --config .pa11yci.resolved.json \
            --json > pa11y-report.json \
            || echo "::warning::Pa11y found violations (see pa11y-report.json artifact)"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports-${{ github.run_id }}
          path: |
            axe-report.json
            pa11y-report.json
            .pa11yci.resolved.json
          retention-days: 30
          if-no-files-found: warn
