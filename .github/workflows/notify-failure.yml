name: Notify on Workflow Failure

# Listens for completion of the repo's scheduled workflows and sends a single
# email alert via Resend when any of them fails. Closes the "GitHub Actions
# failure alerts" gap tracked in VII-D / VII-H of the master quality reference.
#
# Self-excluded: this workflow is not in the `workflows:` list below, so a
# failure in this alerter does not create an alert loop.

on:
  workflow_run:
    # MAINTENANCE POLICY (pkg P1-09):
    # - Every scheduled workflow MUST be listed here by its `name:` value.
    # - Every build-gating workflow (CI / typecheck / lint) MUST be listed here.
    # - Manual-only (workflow_dispatch) workflows are optional — operator is
    #   already watching when running them interactively.
    # - `Notify on Workflow Failure` is intentionally NOT listed (would create
    #   alert loops).
    #
    # When adding a new scheduled or CI workflow: append its `name:` value
    # (exact match, including em-dashes or unicode) to the list below.
    workflows:
      - Daily Analytics Email
      - Daily Blog Post
      - Agent — Weekly Intelligence
      - Agent — Data Collectors
      - Social Media Auto-Post
      - Social Media Engagement
      - Sync Amazon Ratings
      - Build & Typecheck
      - i18n Parity
    types:
      - completed

permissions:
  contents: read

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send Resend alert
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.ANALYTICS_EMAIL }}
          FROM_EMAIL: "Little Chubby Alerts <hello@littlechubbypress.com>"
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
          EVENT: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${TO_EMAIL:-}" ]; then
            echo "::warning::Missing RESEND_API_KEY or ANALYTICS_EMAIL; cannot send failure alert."
            exit 0
          fi
          TEXT_BODY=$(printf 'Workflow: %s\nRepo: %s\nBranch: %s\nCommit: %s\nTriggered by: %s (event: %s)\nRun: %s\n\nCheck the logs and re-run or investigate.' "${WORKFLOW}" "${REPO}" "${HEAD_BRANCH}" "${HEAD_SHA}" "${ACTOR}" "${EVENT}" "${RUN_URL}")
          PAYLOAD=$(jq -nc \
            --arg from "${FROM_EMAIL}" \
            --arg to "${TO_EMAIL}" \
            --arg subject "[GH Actions] ${WORKFLOW} failed (#${RUN_NUMBER}) on ${REPO}" \
            --arg text "${TEXT_BODY}" \
            '{from:$from, to:[$to], subject:$subject, text:$text}')
          curl -sS --fail-with-body -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            || { echo "::error::Failed to deliver Resend alert email."; exit 1; }
