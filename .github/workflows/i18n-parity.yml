name: i18n Parity

# Verifies bilingual content parity (master doc invariant #9, pkg P2-11.1):
#   - Every blog postId in src/content/blog/en/*.md has a matching postId in
#     src/content/blog/es/*.md, and vice versa. Posts with `category: "joke"`
#     are excluded (intentional language-specific humor).
#   - Every book in src/data/books.ts declares both EN and ES strings for
#     title, subtitle, description, coverAlt, ageRange.
#
# Static check — no preview deploy required, fast (~2s), fail-hard from day 1.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Check i18n parity (blog + books)
        run: npm run check:i18n
