# Manual Make relay workflow.
# Direct posting is the default automation path.
# Keep this workflow as a fallback for troubleshooting Meta auth issues.

name: Social Media Make Relay

permissions:
  contents: read

concurrency:
  group: social-make-relay
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Post type"
        required: true
        default: "book-promo"
        type: choice
        options:
          - book-promo
          - blog-share
          - engagement
          - community
      lang:
        description: "Language"
        required: true
        default: "en"
        type: choice
        options:
          - en
          - es
      dry_run:
        description: "Preview payload only (do not call Make webhook)"
        required: true
        default: true
        type: boolean

jobs:
  relay-to-make:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate webhook configuration
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          if [ -z "$MAKE_WEBHOOK_URL" ]; then
            echo "::error::Missing MAKE_WEBHOOK_URL secret. Add it in repository Actions secrets."
            exit 1
          fi

      - name: Send content payload to Make
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_SECRET: ${{ secrets.MAKE_WEBHOOK_SECRET }}
          MAKE_WEBHOOK_ALLOWED_HOSTS: ${{ vars.MAKE_WEBHOOK_ALLOWED_HOSTS }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: |
          TYPE="${{ github.event.inputs.type || 'book-promo' }}"
          LANG="${{ github.event.inputs.lang || 'en' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS=(--type "$TYPE" --lang "$LANG")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          node scripts/social/make.mjs "${ARGS[@]}"