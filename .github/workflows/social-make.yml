# Daily Make relay workflow.
# This workflow generates social content and sends it to Make.com,
# where Facebook and Instagram publishing/auth are handled.

name: Social Media Make Relay

on:
  schedule:
    # 10:00 AM ET (UTC-4) = 14:00 UTC — every day
    - cron: "0 14 * * 1"   # Monday    — book promo
    - cron: "0 14 * * 2"   # Tuesday   — engagement
    - cron: "0 14 * * 3"   # Wednesday — blog share
    - cron: "0 14 * * 4"   # Thursday  — book promo
    - cron: "0 14 * * 5"   # Friday    — engagement
    - cron: "0 14 * * 6"   # Saturday  — community
    - cron: "0 14 * * 0"   # Sunday    — book promo
  workflow_dispatch:
    inputs:
      type:
        description: "Post type"
        required: true
        default: "book-promo"
        type: choice
        options:
          - book-promo
          - blog-share
          - engagement
          - community
      lang:
        description: "Language"
        required: true
        default: "en"
        type: choice
        options:
          - en
          - es
      dry_run:
        description: "Preview payload only (do not call Make webhook)"
        required: true
        default: false
        type: boolean

jobs:
  relay-to-make:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine post type from schedule
        if: github.event_name == 'schedule'
        id: schedule
        run: |
          DAY=$(date -u +%u)
          case $DAY in
            1) echo "type=book-promo" >> $GITHUB_OUTPUT ;;
            2) echo "type=engagement" >> $GITHUB_OUTPUT ;;
            3) echo "type=blog-share" >> $GITHUB_OUTPUT ;;
            4) echo "type=book-promo" >> $GITHUB_OUTPUT ;;
            5) echo "type=engagement" >> $GITHUB_OUTPUT ;;
            6) echo "type=community" >> $GITHUB_OUTPUT ;;
            0) echo "type=book-promo" >> $GITHUB_OUTPUT ;;
            *) echo "type=book-promo" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send content payload to Make
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_SECRET: ${{ secrets.MAKE_WEBHOOK_SECRET }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: |
          TYPE="${{ github.event.inputs.type || steps.schedule.outputs.type }}"
          LANG="${{ github.event.inputs.lang || 'en' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS=(--type "$TYPE" --lang "$LANG")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          node scripts/social/make.mjs "${ARGS[@]}"