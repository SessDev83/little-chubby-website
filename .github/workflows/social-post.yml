# Automated direct-post schedule.
# This workflow is the primary automation path (no Make relay required).
# Platforms without secrets are skipped gracefully.

name: Social Media Auto-Post

permissions:
  contents: read
  actions: write

concurrency:
  group: social-direct-post
  cancel-in-progress: false

on:
  schedule:
    # ── Every 4 hours from 8 AM to 12 AM ET ──
    # 8:00 AM ET = 12:00 UTC
    - cron: "0 12 * * *"
    # 12:00 PM ET = 16:00 UTC
    - cron: "0 16 * * *"
    # 4:00 PM ET = 20:00 UTC
    - cron: "0 20 * * *"
    # 8:00 PM ET = 00:00 UTC (next day)
    - cron: "0 0 * * *"
    # 12:00 AM ET = 04:00 UTC (next day)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Post type"
        required: true
        default: "book-promo"
        type: choice
        options:
          - book-promo
          - blog-share
          - blog-new
          - engagement
          - parenting-tip
          - behind-scenes
          - fun-fact
          - community
          - free-coloring
          - giveaway
          - share-earn
      platform:
        description: "Platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - bluesky
          - facebook
          - instagram
      lang:
        description: "Language"
        required: true
        default: "en"
        type: choice
        options:
          - en
          - es

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Restore post state
        uses: actions/cache/restore@v4
        with:
          path: |
            scripts/social/.post-state.json
            scripts/social/.post-history.json
            scripts/social/.validation-failures.jsonl
          key: social-post-state-${{ github.run_id }}
          restore-keys: social-post-state-

      - name: Determine scheduled post settings
        if: github.event_name == 'schedule'
        id: schedule
        run: |
          # ── Weekly content grid (playbook §7) — 7 days × 5 slots = 35 posts/week ──
          # Mix targets (playbook §5):
          #   free-coloring 40%, engagement 26%, blog-share 11%, share-earn 9%,
          #   parenting-tip 6%, giveaway 6%, book-promo ≤3%, community/fun-fact filler
          # Slot order each day: 04 UTC (0), 12 UTC (1), 16 UTC (2), 20 UTC (3), 00 UTC (4)
          # Daily anchors:
          #   Mon → free-coloring spotlight + parenting tip (week kickoff)
          #   Tue → engagement + free-coloring + blog
          #   Wed → share-earn focus + free-coloring
          #   Thu → blog-new + free-coloring + engagement
          #   Fri → giveaway reminder + free-coloring
          #   Sat → community + free-coloring (family time)
          #   Sun → blog-share + light book-promo (1/week max) + fun-fact
          # Format: GRID[day-1][slot] where day 1=Mon..7=Sun
          declare -A GRID
          # Monday
          GRID[1,0]="free-coloring"; GRID[1,1]="engagement"; GRID[1,2]="parenting-tip"; GRID[1,3]="free-coloring"; GRID[1,4]="share-earn"
          # Tuesday
          GRID[2,0]="free-coloring"; GRID[2,1]="engagement"; GRID[2,2]="blog-share"; GRID[2,3]="free-coloring"; GRID[2,4]="engagement"
          # Wednesday
          GRID[3,0]="share-earn"; GRID[3,1]="free-coloring"; GRID[3,2]="engagement"; GRID[3,3]="free-coloring"; GRID[3,4]="parenting-tip"
          # Thursday
          GRID[4,0]="free-coloring"; GRID[4,1]="engagement"; GRID[4,2]="blog-new"; GRID[4,3]="free-coloring"; GRID[4,4]="engagement"
          # Friday
          GRID[5,0]="free-coloring"; GRID[5,1]="giveaway"; GRID[5,2]="free-coloring"; GRID[5,3]="engagement"; GRID[5,4]="share-earn"
          # Saturday
          GRID[6,0]="free-coloring"; GRID[6,1]="community"; GRID[6,2]="free-coloring"; GRID[6,3]="giveaway"; GRID[6,4]="engagement"
          # Sunday
          GRID[7,0]="free-coloring"; GRID[7,1]="blog-share"; GRID[7,2]="fun-fact"; GRID[7,3]="book-promo"; GRID[7,4]="engagement"

          # Day of week (1=Mon..7=Sun) and UTC hour
          DAY=$(date -u +%u)
          HOUR=$(date -u +%H)

          # Map UTC hour to slot index: 04→0, 12→1, 16→2, 20→3, 00→4
          case $HOUR in
            04) SLOT=0 ;;
            12) SLOT=1 ;;
            16) SLOT=2 ;;
            20) SLOT=3 ;;
            00) SLOT=4 ;;
            *)  SLOT=0 ;;
          esac

          TYPE="${GRID[$DAY,$SLOT]:-engagement}"

          # Language ratio: ~80% English, ~20% Spanish
          # ES on Tue slot 4, Thu slot 4, Sat slot 4, Sun slot 1 (4 of 35 posts = ~11%)
          # Free-coloring slots stay EN to maximize primary-KPI signal.
          LANG="en"
          if [ "$DAY" = "2" ] && [ "$SLOT" = "4" ]; then LANG="es"; fi
          if [ "$DAY" = "4" ] && [ "$SLOT" = "4" ]; then LANG="es"; fi
          if [ "$DAY" = "6" ] && [ "$SLOT" = "4" ]; then LANG="es"; fi
          if [ "$DAY" = "7" ] && [ "$SLOT" = "1" ]; then LANG="es"; fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          echo "📋 Day=$DAY Hour=$HOUR Slot=$SLOT → $TYPE ($LANG)"

      - name: Post to social media
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TYPE="${{ github.event.inputs.type || steps.schedule.outputs.type || 'book-promo' }}"
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          LANG="${{ github.event.inputs.lang || steps.schedule.outputs.lang || 'en' }}"
          node scripts/social/post.mjs post --type "$TYPE" --platform "$PLATFORM" --lang "$LANG" --smart

      - name: Save post state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            scripts/social/.post-state.json
            scripts/social/.post-history.json
            scripts/social/.validation-failures.jsonl
          key: social-post-state-${{ github.run_id }}
