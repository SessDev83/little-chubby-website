# Automated direct-post schedule.
# This workflow is the primary automation path (no Make relay required).
# Platforms without secrets are skipped gracefully.

name: Social Media Auto-Post

permissions:
  contents: read
  actions: write

concurrency:
  group: social-direct-post
  cancel-in-progress: false

on:
  schedule:
    # ── Every 4 hours from 8 AM to 12 AM ET ──
    # 8:00 AM ET = 12:00 UTC
    - cron: "0 12 * * *"
    # 12:00 PM ET = 16:00 UTC
    - cron: "0 16 * * *"
    # 4:00 PM ET = 20:00 UTC
    - cron: "0 20 * * *"
    # 8:00 PM ET = 00:00 UTC (next day)
    - cron: "0 0 * * *"
    # 12:00 AM ET = 04:00 UTC (next day)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Post type"
        required: true
        default: "book-promo"
        type: choice
        options:
          - book-promo
          - blog-share
          - blog-new
          - engagement
          - parenting-tip
          - behind-scenes
          - fun-fact
          - community
      platform:
        description: "Platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - bluesky
          - facebook
          - instagram
      lang:
        description: "Language"
        required: true
        default: "en"
        type: choice
        options:
          - en
          - es

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Restore post state
        uses: actions/cache@v4
        with:
          path: scripts/social/.post-state.json
          key: social-post-state

      - name: Determine scheduled post settings
        if: github.event_name == 'schedule'
        id: schedule
        run: |
          # 7 content categories — rotate through them sequentially
          TYPES=("book-promo" "parenting-tip" "blog-share" "behind-scenes" "fun-fact" "community" "engagement")

          # Day of week (1=Mon..7=Sun) and slot within the day (0-4)
          DAY=$(date -u +%u)
          HOUR=$(date -u +%H)

          # Map UTC hour to slot index: 04→0, 12→1, 16→2, 20→3, 00→4
          case $HOUR in
            04) SLOT=0 ;;
            12) SLOT=1 ;;
            16) SLOT=2 ;;
            20) SLOT=3 ;;
            00) SLOT=4 ;;
            *)  SLOT=0 ;;
          esac

          # Calculate a unique index across the week: (day-1)*5 + slot = 0..34
          INDEX=$(( (DAY - 1) * 5 + SLOT ))
          TYPE_INDEX=$(( INDEX % 7 ))
          TYPE="${TYPES[$TYPE_INDEX]}"

          # Alternate language: even index = EN, odd index = ES
          if [ $(( INDEX % 2 )) -eq 0 ]; then
            LANG="en"
          else
            LANG="es"
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          echo "📋 Slot $INDEX → $TYPE ($LANG) [Day $DAY, Hour $HOUR, Slot $SLOT]"

      - name: Post to social media
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TYPE="${{ github.event.inputs.type || steps.schedule.outputs.type || 'book-promo' }}"
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          LANG="${{ github.event.inputs.lang || steps.schedule.outputs.lang || 'en' }}"
          node scripts/social/post.mjs post --type "$TYPE" --platform "$PLATFORM" --lang "$LANG" --smart

      - name: Save post state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scripts/social/.post-state.json
          key: social-post-state
