# Automated daily blog post creation.
# Picks the next pending topic from scripts/blog-queue.json,
# generates bilingual EN+ES content via Claude + hero image,
# commits and pushes to main. Vercel auto-deploys from there.

name: Daily Blog Post

permissions:
  contents: write

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

on:
  schedule:
    # Every day at 8:00 AM ET (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (leave empty to use queue)"
        required: false
        type: string
      bookId:
        description: "Book ID to link (optional)"
        required: false
        type: string

jobs:
  create-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Create blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          BOOK="${{ github.event.inputs.bookId }}"
          if [ -n "$TOPIC" ]; then
            CMD="node scripts/create-blog-post.mjs --topic \"$TOPIC\""
            if [ -n "$BOOK" ]; then
              CMD="$CMD --bookId \"$BOOK\""
            fi
            eval $CMD
          else
            node scripts/create-blog-post.mjs --auto
          fi

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new files to commit (queue might be empty)"
            exit 0
          fi
          # Extract post title from the new EN markdown file
          NEW_FILE=$(git diff --cached --name-only | grep "src/content/blog/en/" | head -1)
          if [ -n "$NEW_FILE" ]; then
            SLUG=$(basename "$NEW_FILE" .md)
            git commit -m "blog: auto — ${SLUG}"
          else
            git commit -m "blog: auto — daily post"
          fi
          git push
