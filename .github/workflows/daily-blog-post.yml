# Automated daily blog post creation.
# Picks the next pending topic from scripts/blog-queue.json,
# generates bilingual EN+ES content via Claude + hero image,
# opens an auto-merge PR. Vercel auto-deploys after merge.

name: Daily Blog Post

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

on:
  schedule:
    # Every day at 8:00 AM ET (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (leave empty to use queue)"
        required: false
        type: string
      bookId:
        description: "Book ID to link (optional)"
        required: false
        type: string

jobs:
  create-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          BOOK="${{ github.event.inputs.bookId }}"
          if [ -n "$TOPIC" ]; then
            CMD="node scripts/create-blog-post.mjs --topic \"$TOPIC\""
            if [ -n "$BOOK" ]; then
              CMD="$CMD --bookId \"$BOOK\""
            fi
            eval $CMD
          else
            node scripts/create-blog-post.mjs --auto
          fi

      - name: Validate build
        env:
          PUBLIC_SITE_URL: https://www.littlechubbypress.com
          PUBLIC_SUPABASE_URL: https://dummy-ci-build.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkdW1teSIsInJvbGUiOiJhbm9uIn0.ci-build-placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkdW1teSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUifQ.ci-build-placeholder
        run: npm run build

      - name: Commit and open auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new files to commit (queue might be empty)"
            exit 0
          fi
          # Extract slug from the new EN markdown file (used for branch name + commit msg)
          NEW_FILE=$(git diff --cached --name-only | grep "src/content/blog/en/" | head -1)
          if [ -n "$NEW_FILE" ]; then
            SLUG=$(basename "$NEW_FILE" .md)
            COMMIT_MSG="blog: auto — ${SLUG}"
          else
            SLUG="daily-$(date +%Y%m%d)"
            COMMIT_MSG="blog: auto — daily post"
          fi
          BRANCH="auto-blog/${SLUG}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "$COMMIT_MSG"
          git push --set-upstream origin "$BRANCH"
          # Open PR, then explicitly dispatch the build workflow on the generated branch.
          # Events created by GITHUB_TOKEN do not reliably trigger sibling workflows.
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_MSG" \
            --body "Automated daily blog post. Auto-merges once \`build-and-typecheck\` passes.")
          echo "PR opened: $PR_URL"
          gh workflow run build-and-typecheck.yml --ref "$BRANCH"
          gh pr merge "$PR_URL" --auto --squash --delete-branch
